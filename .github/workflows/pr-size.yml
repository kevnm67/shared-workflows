name: PR Size

on:
  workflow_call:

permissions:
  pull-requests: write

jobs:
  size:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Label PR by size
        uses: codelytv/pr-size-labeler@v1
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          xs_label: "size/XS"
          xs_max_size: 9
          s_label: "size/S"
          s_max_size: 49
          m_label: "size/M"
          m_max_size: 199
          l_label: "size/L"
          l_max_size: 499
          xl_label: "size/XL"
          fail_if_xl: false
          message_if_xl: "This PR is quite large. Consider breaking it into smaller PRs for easier review."
